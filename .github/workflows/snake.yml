name: Generate snake game

on:
  schedule:
    - cron: "0 */12 * * *" # every 12 hours
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write # needed to push to output branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }} # avoids API rate limits
          # Custom palette: snake = #FFA308, grass = GitHub dark theme
          palette: '{"snake":["#FFA308"]}'
          outputs: |
            dist/github-contribution-grid-snake2.svg

      - uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
